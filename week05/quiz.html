<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <title>THIS IS THE W05 LEARNING ACTIVITY ON HTML FORMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a W05 learning activity on FORMS">
    <meta name="author" content="Isaac CINZA">
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <h1>Basic HTML and CSS Quiz</h1>

    <form action="#" method="post">

        <!-- Question 1: Text input -->
        <fieldset>
            <legend>Question 1: HTML</legend>
            <label for="q1">What attribute is used to specify the URL of an image in the
                &lt;img&gt;
                tag?</label>
            <input type="text" id="q1" name="q1">
        </fieldset>

        <!-- Question 2: Textarea -->
        <fieldset>
            <legend>Question 2: HTML</legend>
            <label for="q2">Write the correct HTML code to create a hyperlink to www.example.com
                with
                the text “Visit Example”.</label>
            <textarea id="q2" name="q2" rows="4" cols="50"></textarea>
        </fieldset>

        <!-- Question 3: Select dropdown -->
        <fieldset>
            <legend>Question 3: CSS</legend>
            <label for="q3">Which CSS property is used to change the text color?</label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="color">color</option>
                <option value="background-color">background-color</option>
                <option value="font-color">font-color</option>
            </select>
        </fieldset>

        <!-- Question 4: Number input -->
        <fieldset>
            <legend>Question 4: HTML & CSS</legend>
            <label for="q4">How many heading levels (&lt;h1&gt; to &lt;h6&gt;) are defined in
                HTML?</label>
            <input type="number" id="q4" name="q4" min="1" max="6">
        </fieldset>

        <button type="submit">Submit Quiz</button>

    </form>

</body>

</html>
